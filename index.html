<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENCO Block Schedule — Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-brand">
        <span class="brand-renco">RENCO</span>
        <span class="brand-sep">&times;</span>
        <span class="brand-bim6x">BIM6x</span>
      </div>
      <h1 class="hero-title">Block Schedule</h1>
      <p class="hero-project">Project Dashboard</p>
    </div>
  </header>

  <section class="section">
    <div class="section-inner">
      <h2 class="section-title">Projects</h2>
      <div class="project-grid" id="project-grid">
        <p class="loading-msg">Loading projects...</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <p>Generated by <strong>RENCO Block Calculator v0.3</strong></p>
    </div>
  </footer>

  <script>
    async function init() {
      try {
        const resp = await fetch('projects.json');
        const projects = await resp.json();
        const grid = document.getElementById('project-grid');
        grid.innerHTML = '';

        if (!projects.length) {
          grid.innerHTML = '<p>No projects yet. Run the pipeline to add one.</p>';
          return;
        }

        projects.sort((a, b) => new Date(b.run_date) - new Date(a.run_date));

        projects.forEach(p => {
          const card = document.createElement('a');
          card.href = p.slug + '/';
          card.className = 'project-card';

          const d = new Date(p.run_date);
          const dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

          const imgSrc = p.slug + '/assets/model.png';

          card.innerHTML = `
            <div class="project-card-img" style="background-image: url('${imgSrc}')"></div>
            <div class="project-card-body">
              <h3 class="project-card-title">${p.name}</h3>
              <div class="project-card-stats">
                <span>${p.total_blocks.toLocaleString()} blocks</span>
                <span>${p.containers} containers</span>
              </div>
              <div class="project-card-date">${dateStr}</div>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        document.getElementById('project-grid').innerHTML = '<p>No projects yet. Run the pipeline to add one.</p>';
      }
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
